name: Database Backup

on:
  schedule:
    # 1st of every month at 02:00 UTC (10:00 MYT)
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  backup:
    name: Dump & upload to GCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run pg_dump
        id: dump
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
          GCS_BUCKET_NAME:     ${{ secrets.GCS_BUCKET_NAME }}
          PG_DUMP_BIN:         /usr/lib/postgresql/17/bin/pg_dump
        run: |
          output=$(npm run db:backup 2>&1)
          echo "$output"
          backup_file=$(echo "$output" | grep '^BACKUP_FILE=' | cut -d= -f2-)
          backup_dest=$(echo "$output" | grep '^BACKUP_DEST=' | cut -d= -f2-)
          echo "backup_file=$backup_file" >> $GITHUB_OUTPUT
          echo "backup_dest=$backup_dest" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_JSON }}

      - name: Upload to GCS
        run: |
          gcloud storage cp "${{ steps.dump.outputs.backup_file }}" "${{ steps.dump.outputs.backup_dest }}"
          echo "✅  Uploaded → ${{ steps.dump.outputs.backup_dest }}"
          rm -f "${{ steps.dump.outputs.backup_file }}"
